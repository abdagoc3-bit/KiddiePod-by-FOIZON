<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>KiddiePod — Pick Your Story</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="planet planet-1"><div class="planet-ring"></div></div>

  <header class="site-header">
    <a class="logo" href="index.html">KiddiePod</a>
    <nav class="header-nav">
      <span class="nav-crumb">Welcome</span>

        <span class="guide-banner-speech"></span>
